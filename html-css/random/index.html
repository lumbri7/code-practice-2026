<!DOCTYPE html>

<html lang="en">

<head>

   <title>Student Biodata Form</title>

</head>

<body>

   <h2>Student Biodata Form</h2>

   <form action="#" method="post">

       <label for="fullName">Full Name:</label>

       <input type="text" id="fullName" name="fullName" required><br><br>

       

       <label for="dob">Date of Birth:</label>

       <input type="date" id="dob" name="dob" required><br><br>

       <label>Gender:</label>

       <input type="radio" id="male" name="gender" value="Male" required>

       <label for="male">Male</label>

       <input type="radio" id="female" name="gender" value="Female">

       <label for="female">Female</label><br><Br>

       <label for="email">Email Address:</label>

       <input type="email" id="email" name="email" required><br><br>

       <label for="phone">Phone Number:</label>

       <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required><br><br>

       <label for="course">Course Enrolled:</label>

       <input type="text" id="course" name="course" required><br><br>

       <label for="graduationYear">Expected Graduation Year:</label>

       <input type="number" id="graduationYear" name="graduationYear" min="2000" max="2099" step="1" required><br><br>

       <label for="skills">Skills:</label><br>

       <textarea id="skills" name="skills" rows="3" required></textarea><br><br>

       <label for="references">References:</label><br>

       <textarea id="references" name="references" rows="3"></textarea><br><br>      

       <button type="submit">Submit</button>

   </form>

</body>

</html>
